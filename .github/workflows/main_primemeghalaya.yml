# Container deploy: build the Docker image (Next standalone output), push to
# GitHub Container Registry, then point the Azure Web App at the new image.
#
# Requirements (one-time, on THIS repo — balajied29/primewebsite):
#   - Secret AZUREAPPSERVICE_PUBLISHPROFILE = contents of the app's .PublishSettings.
#   - The GHCR package ghcr.io/balajied29/primewebsite must be PUBLIC (package
#     settings on GitHub), or the App Service needs DOCKER_REGISTRY_SERVER_*
#     settings with a PAT that has read:packages.
#   - App Service (Linux) app setting WEBSITES_PORT=3000.
#
# No `npm run test` here: the suite's pretest hook needs a local Postgres the
# runner lacks. Tests run separately.

name: Build and deploy container to Azure Web App - primemeghalaya

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    # Only the production repo builds + deploys; a fork push is a no-op (deploy
    # needs: build, so it is skipped too).
    if: github.repository == 'balajied29/primewebsite'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          # Client-side Sentry DSN, inlined into the browser bundle at build time.
          # Set repo variable NEXT_PUBLIC_SENTRY_DSN (Settings → Secrets and
          # variables → Actions → Variables). Empty ⇒ client SDK stays disabled;
          # server-side capture uses the runtime SENTRY_DSN App Service setting.
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Azure Web App (container)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'primemeghalaya'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          images: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
